name: exploring variables and secrets in jobs

on: push 


jobs:
    docker1:
        runs-on: ubuntu-latest
        env:
            CONTAINER_REGISTRY: docker.io
            DOCKER_USERNAME: harisdocker
            IMAGE_NAME: nginx      
        steps:
          - name: docker build
            run: echo "docker build -t $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest"

          - name: docker login
            env:
                DOCKER_PASSWD: Passw@123
            run: echo "docker login --username="$DOCKER_USERNAME" --password="Passw@123"

          - name: docker publish 
            run: echo "docker push $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest"

    deploy1:
        needs: docker1
        env:
            CONTAINER_REGISTRY: docker.io
            DOCKER_USERNAME: harisdocker
            IMAGE_NAME: nginx
        runs-on: ubuntu-latest
        steps:
          - name: docker run
            run: echo "docker run -d -p 8080:80 $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest"