name: concurrency job check

on: workflow_dispatch

jobs:
    docker2:
        runs-on: ubuntu-latest 
        steps:
          - name: docker build
            run: echo "docker build -t ${{ vars.CONTAINER_REGISTRY}}/${{ vars.DOCKER_USERNAME }}/${{ vars.IMAGE_NAME }}:latest"

          - name: docker login
            run: echo "docker login --username=${{ vars.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWD }} "

          - name: docker publish 
            run: echo "docker push ${{ vars.CONTAINER_REGISTRY}}/${{ vars.DOCKER_USERNAME }}/${{ vars.IMAGE_NAME }}:latest"

    deploy2:
        needs: docker2
        concurrency: 
            group: production deployment
            cancel-in-progress: true  # If true new event triggered will progress and the old event will be cancelled
        runs-on: ubuntu-latest
        steps:
          - name: docker run
            run: echo "docker run -d -p 8080:80 ${{ vars.CONTAINER_REGISTRY}}/${{ vars.DOCKER_USERNAME }}/${{ vars.IMAGE_NAME }}:latest"