name: artifact-workflow-pipeline

on: push

jobs:
    build-job1:
        runs-on: ubuntu-latest
        steps:
          - name: ascii cowsay installation
            run: |
              sudo apt-get install cowsay -y

          - name: generate ascii art
            run: cowsay -f dragon "I am the dragon king" >> dragon.txt

          - name: output-job-1
            run: echo "ascii artwork generated"

          - name: uploading artifacts
            uses: actions/upload-artifact@v4
            with:
                name: dragon
                path: dragon.txt

          - name: artifact uploaded
            run: echo "artifact uploaded"


    test-job1:
        needs: build-job1
        runs-on: ubuntu-latest
        steps:

          - name: download artifact inside runner
            uses: actions/download-artifact@v8
            with:
                name: dragon
        
          - name: artifact downloaded
            run: echo "artifact downloaded from build-job1"
        
          - name: searching file 
            run: grep -i "dragon" dragon.txt

          - name: test for artwork
            run: echo "artwork file present"

          

    deploy-job1:
        needs: 
            - build-job1
            - test-job1
        runs-on: ubuntu-latest
        steps:

           - name: download artifact inside runner
             uses: actions/download-artifact@v8
             with:
                name: dragon

           - name: artifact downloaded
             run: echo "artifact downloaded from build-job1"
        

           - name: viewing art file
             run: cat dragon.txt
            
           - name: artfile deployed
             run: echo "artwork deployed on runner"
              