name: matrix workflow

on:
    workflow_dispatch:  

jobs:
    matrix-1:
        strategy:
          matrix:
            os: ["ubuntu-latest", "ubuntu-20.04"]
            images: ["hello-world", "nginx", "alpine"]
        runs-on: ${{matrix.os}}
        steps:
          - name: docker version
            run: docker --version

          - name: docker details 
            run: docker info

          - name: run docker images
            run: docker run -d ${{matrix.images}}