name: exploring variables and secrets in steps

on: push

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
          - name: docker build
            run: echo "docker build -t docker.io/harisdocker/nginx:latest"

          - name: docker login
            run: echo "docker login --username="harisdocker" --password="Passw@123"

          - name: docker publish 
            run: echo "docker push docker.io/harisdocker/nginx:latest"

    deploy:
      needs: docker
      runs-on: ubuntu-latest
      steps:
        - name: docker run
          run: echo "docker run -d -p 8080:80 docker.io/harisdocker/nginx:latest"


         #****Environment variables at steps level****#
    
    docker1:
            runs-on: ubuntu-latest
            steps:
              - name: docker build
                env:
                    CONTAINER_REGISTRY: docker.io
                    DOCKER_USERNAME: harisdocker
                    IMAGE_NAME: nginx
                run: echo "docker build -t "$CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest"
    
              - name: docker login
                env:
                    DOCKER_USERNAME: harisdocker
                    DOCKER_PASSWD: Passw@123
                run: echo "docker login --username=$DOCKER_USERNAME --password="Passw@123"
    
              - name: docker publish 
                env:
                    CONTAINER_REGISTRY: docker.io
                    DOCKER_USERNAME: harisdocker
                    IMAGE_NAME: nginx
                run: echo "docker push $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest"
    
    deploy1:
          needs: docker
          runs-on: ubuntu-latest
          steps:
            - name: docker run
              env:
                CONTAINER_REGISTRY: docker.io
                DOCKER_USERNAME: harisdocker
                IMAGE_NAME: nginx
              run: echo "docker run -d -p 8080:80 $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest"
    
    
      
        
